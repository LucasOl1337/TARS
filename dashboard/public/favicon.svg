<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0c10"/>
      <stop offset="100%" stop-color="#050608"/>
    </linearGradient>
    <linearGradient id="mono" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="50%" stop-color="#c2cad6"/>
      <stop offset="100%" stop-color="#7e8a99"/>
    </linearGradient>
  </defs>
  <!-- rounded dark bg like original -->
  <rect x="16" y="16" width="480" height="480" rx="80" fill="url(#bg)"/>
  <!-- monolith centered, scaled to fit favicon nicely -->
  <g transform="translate(196, 76)">
    <rect x="0" y="0" width="120" height="360" rx="6" fill="url(#mono)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <!-- joints -->
    <line x1="0" y1="60" x2="120" y2="60" stroke="#5a6570" stroke-width="2"/>
    <line x1="0" y1="120" x2="120" y2="120" stroke="#5a6570" stroke-width="2"/>
    <line x1="0" y1="180" x2="120" y2="180" stroke="#5a6570" stroke-width="2"/>
    <line x1="0" y1="240" x2="120" y2="240" stroke="#5a6570" stroke-width="2"/>
    <line x1="0" y1="300" x2="120" y2="300" stroke="#5a6570" stroke-width="2"/>
    <!-- accent like logo -->
    <rect x="10" y="30" width="60" height="3" fill="#b85a42" opacity="0.7"/>
  </g>
</svg>
